<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apexora Portfolio</title>

<style>
#particles-js {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #c683cf, #06b6d4);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CARD */
.card {
  width: 340px;
  background: rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 25px;
  text-align: center;
  backdrop-filter: blur(15px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  animation: float 4s ease-in-out infinite;
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-12px) scale(1.04);
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* PROFILE IMAGE WITH GLOW */
.profile-img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 4px solid transparent;
  background: linear-gradient(#fff, #fff) padding-box,
              linear-gradient(45deg, #00f5ff, #ff00ff) border-box;
  object-fit: cover;
  margin-top: -70px;
  transition: 0.4s;
  box-shadow: 0 0 20px #00f5ff;
}

.profile-img:hover {
  transform: scale(1.1) rotate(3deg);
}

/* NAME GRADIENT */
h2 {
  margin: 15px 0 5px;
  background: linear-gradient(45deg, #000, #333);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  -webkit-text-fill-color: transparent;
}

/* ROLE */
.role {
  font-size: 14px;
  height: 20px;
}

/* SKILLS */
.skills span {
  display: inline-block;
  background: rgba(255,255,255,0.2);
  padding: 6px 12px;
  margin: 5px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  position: relative;
  transition: 0.3s;
}

.skills span:hover {
  background: #ffffff;
  color: black;
  transform: scale(1.1);
}

/* TOOLTIP */
.skills span::after {
  content: attr(data-skill);
  position: absolute;
  bottom: 120%;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  color: white;
  padding: 3px 8px;
  font-size: 10px;
  border-radius: 5px;
  opacity: 0;
  transition: 0.3s;
}

.skills span:hover::after {
  opacity: 1;
}

/* STATS */
.stats {
  margin: 10px 0;
  font-size: 14px;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 12px;
  padding: 10px 20px;
  border-radius: 25px;
  background: linear-gradient(45deg, #388c8c, #ab5dab);
  color: black;
  text-decoration: none;
  font-weight: bold;
  position: relative;
  overflow: hidden;
}

.btn::after {
  content: "";
  position: absolute;
  width: 0;
  height: 0;
  background: rgba(255, 255, 255, 0.5);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  transition: 0.4s;
}

.btn:hover::after {
  width: 200px;
  height: 200px;
}

/* ABOUT */
.about {
  margin-top: 10px;
  font-size: 14px;
}

/* SOCIAL */
.social a {
  margin: 0 12px;
  font-size: 26px;
  color: black;
  transition: 0.3s;
}

.social a:hover {
  transform: scale(1.3);
}

.fa-github:hover { color: #ffffff; }
.fa-linkedin:hover { color: #ffffff; }
.fa-globe:hover { color: #ffffff; }

</style>
</head>

<body>

<div id="particles-js"></div>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    size: { value: 3 },
    move: { speed: 2 },
    line_linked: {
      enable: true,
      distance: 120,
      color: "#00f5ff",
      opacity: 0.4
    },
    color: { value: "#00f5ff" }
  }
});
</script>

<div class="card">

  <img src="my photo.jpeg" class="profile-img">

  <h2>Anshul Raj Verma</h2>
  <p class="role" id="typing"></p>

  <div class="skills">
    <span data-skill="Structure">HTML</span>
    <span data-skill="Design">CSS</span>
    <span data-skill="Logic">JavaScript</span>
    <span data-skill="Backend">Python</span>
  </div>

  <div class="stats">
    🚀 <span id="projects">0</span>+ Projects | 💻 2+ Languages
  </div>

  <a href= "https://anshulverma5014.github.io/Apexora-AI/" target="_blank" class="btn">
     Apexora-AI
  </a>

  <div class="about">
    I create modern websites and AI-based tools that solve real-world problems.
  </div>

  <div class="social">
    <a href="https://github.com/anshulverma5014" target="_blank"><i class="fab fa-github"></i></a>
    <a href="https://www.linkedin.com/in/anshul-raj-verma-643338346" target="_blank"><i class="fab fa-linkedin"></i></a>
    <a href="https://anshulverma5014.github.io/Anshul-Verma.io/" target="_blank"><i class="fas fa-globe"></i></a>
  </div>

</div>

<script>
// Typing Effect
const text = ["Web Developer 💻", "AI Builder 🤖", "Creative Coder 🚀"];
let i=0,j=0,current="",isDeleting=false;

function type(){
  current=text[i];
  document.getElementById("typing").innerHTML=current.substring(0,j);

  if(!isDeleting){ j++; if(j>current.length){ isDeleting=true; setTimeout(type,1000); return; }}
  else{ j--; if(j==0){ isDeleting=false; i=(i+1)%text.length; }}

  setTimeout(type,100);
}
type();

// Counter Animation
let count=0;
let target=10;
let interval=setInterval(()=>{
  count++;
  document.getElementById("projects").innerText=count;
  if(count>=target) clearInterval(interval);
},100);
</script>

</body>
</html>
