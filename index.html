<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apexora Portfolio</title>

<style>
    /* PARTICLES BACKGROUND */
#particles-js {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
  top: 0;
  left: 0;
}
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;

  /* 🔥 2 colors gradient */
  background: linear-gradient(135deg, #c683cf, #06b6d4);

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Card */
.card {
  width: 340px;
  background: rgba(179, 107, 206, 0.8);
  border-radius: 20px;
  padding: 25px;
  text-align: center;
  color: #000000;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);

  position: relative;

  /* 🔥 Floating Animation */
  animation: float 4s ease-in-out infinite;

  transition: 0.4s;
}

/* FLOAT ANIMATION */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-12px); }
  100% { transform: translateY(0px); }
}

/* HOVER */
.card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 20px 50px rgba(0,0,0,0.8);
}

/* Profile Image */
.profile-img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 4px solid #00f5ff;
  object-fit: cover;
  margin-top: -70px;
  background: #fff;

  transition: 0.3s;
}

.profile-img:hover {
  transform: scale(1.1);
}

/* Name */
h2 {
  margin: 15px 0 5px;
}

/* Role */
.role {
  font-size: 14px;
  opacity: 0.9;
}

/* Skills */
.skills {
  margin: 15px 0;
}

.skills span {
  display: inline-block;
  background: rgba(255,255,255,0.2);
  padding: 6px 12px;
  margin: 5px;
  border-radius: 20px;
  font-size: 12px;

  transition: 0.3s;
}

.skills span:hover {
  background: #00f5ff;
  color: black;
}

/* Stats */
.stats {
  margin: 10px 0;
  font-size: 14px;
}

/* Button */
.btn {
  display: inline-block;
  margin-top: 12px;
  padding: 10px 20px;
  border-radius: 25px;
  background: linear-gradient(45deg, #388c8c, #ab5dab);
  color: rgb(0, 0, 0);
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  opacity: 0.8;
  transform: scale(1.05);
}

/* About */
.about {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.9;
  line-height: 1.5;
}

/* Social */
.social {
  margin-top: 18px;
}

.social a {
  margin: 0 12px;
  font-size: 26px;
  color: rgb(0, 0, 0);
  transition: 0.3s;
  display: inline-block;
}

.social a:hover {
  transform: scale(1.3);
  color: #c8d5d5;
}
</style>
</head>

<body>
    <div id="particles-js"></div>
    <script>
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    size: { value: 3 },
    move: { speed: 2 },
    line_linked: {
      enable: true,
      distance: 120,
      color: "#00f5ff",
      opacity: 0.4,
      width: 1
    },
    color: { value: "#00f5ff" }
  }
});
</script>

<div class="card">

  <!-- 🔥 High Quality Image -->
  <img src="my photo.jpeg" class="profile-img">

  <h2>Anshul Raj Verma</h2>
  <p class="role">💻 Creative Web Developer</p>

  <div class="skills">
    <span><b>HTML</b></span>
    <span><b>CSS</b></span>
    <span><b>JavaScript</b></span>
    <span><b>Python</b></span>
  </div>

  <div class="stats">
    10+ Projects | 2+ Languages
  </div>

  <!-- 🚀 Live Portfoilo Button -->
  <a href="https://anshulverma5014.github.io/Anshul-Verma.io/" target="_blank" class="btn">
    🚀 Anshul-Verma.io
  </a>


  <div class="about">
    A showcase of my portfolio and skills, including projects built with HTML, CSS, JavaScript, and Python.
  </div>

  <div class="social">
  
  <!-- GitHub -->
  <a href="https://github.com/anshulverma5014" target="_blank">
    <i class="fab fa-github"></i>
  </a>

  <!-- LinkedIn -->
  <a href="https://www.linkedin.com/in/anshul-raj-verma-643338346" target="_blank">
    <i class="fab fa-linkedin"></i>
  </a>

</div>

</div>

</body>
</html>
